<div class="trip-title-bar">
    <div class="trip-info-left">
        <span class="trip-title-number">New Trip</span>
    </div>
    <div class="trip-info-right">
        <button class="record-btn">
            <img src="/static/assets/play.svg" class="record-icon" alt="Start">
        </button>
        <button class="record-btn">
            <img src="/static/assets/square.svg" class="record-icon" alt="Stop">
        </button>
    </div>
</div>

<div class="trip-video-region">
    <div class="live-feed"></div>
</div>

<div class="trip-hazard-section">
    <div class="hazard-detail" id="hazard-detail">
        <p class="no-hazard-selected">No hazards yet</p>
    </div>
    <div class="hazard-list">
        <p class="no-hazards">No hazards recorded</p>
    </div>
</div>
